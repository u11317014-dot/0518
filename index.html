<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雙語互動繪本 - 水果樂園</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

    <style>
        .font-en-storybook {
            font-family: 'Fredoka', sans-serif;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
        @keyframes confettiFall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(400px) rotate(360deg); opacity: 0; }
        }
        @keyframes fruitDrop {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            50% { transform: translateY(80px) scale(0.9); opacity: 0.8; }
            100% { transform: translateY(160px) scale(0); opacity: 0; }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-confetti { animation: confettiFall 3s linear infinite; position: absolute; }
        .fruit-falling { animation: fruitDrop 0.5s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-[#FFFBEB]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 第一階段：著色關卡資料 ---
        const COLOR_LEVELS = [
            { 
                id: 1, 
                targetColors: ['#FF3D00', '#4CAF50'], 
                objectName: { zh: '蘋果', en: 'Apple' }, 
                emoji: '🍎',
                path: "M 100,65 C 75,60 45,65 45,112 C 45,152 75,172 100,163 C 125,172 155,152 155,112 C 155,65 125,60 100,65 Z"
            },
            { 
                id: 2, 
                targetColors: ['#4CAF50'], 
                objectName: { zh: '樹葉', en: 'Leaf' }, 
                emoji: '🌿',
                path: "M 100,35 C 55,72 50,142 100,182 C 150,142 145,72 100,35 Z"
            },
            { 
                id: 3, 
                targetColors: ['#FFD600'], 
                objectName: { zh: '香蕉', en: 'Banana' }, 
                emoji: '🍌',
                path: "M 152,58 C 120,58 60,90 50,162 C 72,162 125,120 152,58 Z"
            },
            { 
                id: 4, 
                targetColors: ['#FF9800'], 
                objectName: { zh: '橘子', en: 'Orange' }, 
                emoji: '🍊',
                path: "M 100,55 C 142,55 170,83 170,122 C 170,162 142,190 100,190 C 58,190 30,162 30,122 C 30,83 58,55 100,55 Z"
            },
            { 
                id: 5, 
                targetColors: ['#9C27B0', '#4CAF50'], 
                objectName: { zh: '葡萄', en: 'Grapes' }, 
                emoji: '🍇',
                path: "M 80,90 A 15,15 0 1,1 80,89.9 Z M 100,90 A 15,15 0 1,1 100,89.9 Z M 120,90 A 15,15 0 1,1 120,89.9 Z M 90,115 A 15,15 0 1,1 90,114.9 Z M 110,115 A 15,15 0 1,1 110,114.9 Z M 100,140 A 15,15 0 1,1 100,139.9 Z"
            }
        ];

        // --- 第二階段：數數關卡資料 ---
        const COUNT_LEVELS = [
            {
                id: 1,
                targetCount: 3,
                emoji: '🍎',
                objectName: { zh: '蘋果', en: 'apples' },
                questionZh: '請把 3 顆蘋果放進籃子裡！',
                questionEn: 'Please put 3 apples into the basket!',
                positions: [
                    {x:22, y:14}, {x:46, y:8}, {x:66, y:12}, {x:14, y:30}, {x:36, y:24},
                    {x:58, y:22}, {x:76, y:28}, {x:26, y:45}, {x:48, y:42}, {x:72, y:46}
                ]
            },
            {
                id: 2,
                targetCount: 5,
                emoji: '🍊',
                objectName: { zh: '橘子', en: 'oranges' },
                questionZh: '請把 5 顆橘子放進籃子裡！',
                questionEn: 'Please put 5 oranges into the basket!',
                positions: [
                    {x:30, y:10}, {x:52, y:6}, {x:72, y:14}, {x:18, y:26}, {x:42, y:22},
                    {x:60, y:20}, {x:82, y:28}, {x:24, y:44}, {x:48, y:46}, {x:68, y:42}
                ]
            },
            {
                id: 3,
                targetCount: 4,
                emoji: '🍌',
                objectName: { zh: '香蕉', en: 'bananas' },
                questionZh: '請把 4 根香蕉放進籃子裡！',
                questionEn: 'Please put 4 bananas into the basket!',
                positions: [
                    {x:22, y:14}, {x:46, y:8}, {x:66, y:12}, {x:14, y:30}, {x:36, y:24},
                    {x:58, y:22}, {x:76, y:28}, {x:26, y:45}, {x:48, y:42}, {x:72, y:46}
                ]
            }
        ];

        const COLORS = [
            { zh: '紅色', en: 'Red', code: '#FF3D00' },
            { zh: '黃色', en: 'Yellow', code: '#FFD600' },
            { zh: '綠色', en: 'Green', code: '#4CAF50' },
            { zh: '藍色', en: 'Blue', code: '#2196F3' },
            { zh: '橘色', en: 'Orange', code: '#FF9800' },
            { zh: '紫色', en: 'Purple', code: '#9C27B0' }
        ];

        const RotateCcwIcon = () => (
            <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><polyline points="3 3 3 8 8 8" />
            </svg>
        );

        const App = () => {
            const [gameStage, setGameStage] = useState('color');
            const [levelIdx, setLevelIdx] = useState(0);
            const [coverage, setCoverage] = useState(0);
            const [isCompleted, setIsCompleted] = useState(false);
            const [isDrawing, setIsDrawing] = useState(false);
            const [selectedColor, setSelectedColor] = useState(null);
            
            const [basketCount, setBasketCount] = useState(0);
            const [droppedFruits, setDroppedFruits] = useState([]); 

            const canvasRef = useRef(null);
            const maskCanvasRef = useRef(null);
            const ctxRef = useRef(null);
            const lastPos = useRef({ x: 0, y: 0 });

            const currentColorLevel = COLOR_LEVELS[levelIdx];
            const currentCountLevel = COUNT_LEVELS[levelIdx];

            const speakBilingual = (zhText, enText) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    
                    const zhUtterance = new SpeechSynthesisUtterance(zhText);
                    zhUtterance.lang = 'zh-TW';
                    zhUtterance.rate = 0.85;

                    const enUtterance = new SpeechSynthesisUtterance(enText);
                    enUtterance.lang = 'en-US';
                    enUtterance.rate = 0.85;

                    zhUtterance.onend = () => {
                        if (enText) window.speechSynthesis.speak(enUtterance);
                    };
                    window.speechSynthesis.speak(zhUtterance);
                }
            };

            const speakQuestion = () => {
                if (gameStage === 'color') {
                    const zhText = `${currentColorLevel.objectName.zh}是什麼顏色的呢？`;
                    const enText = `What color is the ${currentColorLevel.objectName.en}?`;
                    speakBilingual(zhText, enText);
                } else {
                    speakBilingual(currentCountLevel.questionZh, currentCountLevel.questionEn);
                }
            };

            const initCanvas = () => {
                if (gameStage !== 'color' || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctxRef.current = ctx;
                ctx.clearRect(0, 0, 200, 200);

                const mCanvas = maskCanvasRef.current;
                const mCtx = mCanvas.getContext('2d');
                mCtx.clearRect(0, 0, 200, 200);
                const pathObj = new Path2D(currentColorLevel.path);
                mCtx.fillStyle = '#000000';
                mCtx.fill(pathObj);
            };

            useEffect(() => {
                if (gameStage === 'color') {
                    initCanvas();
                    setCoverage(0);
                } else {
                    setBasketCount(0);
                    setDroppedFruits([]);
                }
                setIsCompleted(false);
                setSelectedColor(null); 
                setTimeout(() => {
                    speakQuestion();
                }, 150);
            }, [levelIdx, gameStage]);

            const handleNextLevel = () => {
                if (gameStage === 'color') {
                    if (levelIdx + 1 < COLOR_LEVELS.length) {
                        setLevelIdx(levelIdx + 1);
                    } else {
                        setGameStage('count');
                        setLevelIdx(0);
                    }
                } else {
                    if (levelIdx + 1 < COUNT_LEVELS.length) {
                        setLevelIdx(levelIdx + 1);
                    } else {
                        setGameStage('color');
                        setLevelIdx(0);
                    }
                }
            };

            const handleFruitClick = (index) => {
                if (isCompleted || droppedFruits.includes(index)) return;

                const nextCount = basketCount + 1;
                
                if (nextCount > currentCountLevel.targetCount) {
                    speakBilingual("籃子裝不下了，重來一次看看喔！", "The basket is full! Try again.");
                    setBasketCount(0);
                    setDroppedFruits([]);
                    return;
                }

                setDroppedFruits([...droppedFruits, index]);
                setBasketCount(nextCount);
                speakBilingual(`${nextCount}`, `${nextCount}`);

                if (nextCount === currentCountLevel.targetCount) {
                    setTimeout(() => {
                        setIsCompleted(true);
                        const winZh = `哇！太棒了！你放進了 ${currentCountLevel.targetCount} 顆${currentCountLevel.objectName.zh}！`;
                        const winEn = `Great job! You put ${currentCountLevel.targetCount} ${currentCountLevel.objectName.en}!`;
                        speakBilingual(winZh, winEn);
                    }, 600);
                }
            };

            const renderLevelDetails = (id) => {
                switch(id) {
                    case 1: 
                        return (
                            <g fill="none" stroke="#2D3436" strokeWidth="2">
                                <path d="M100,65 Q102,45 110,40" stroke="#795548" strokeWidth="4" strokeLinecap="round" />
                                <path d="M104,48 Q125,35 130,50 Q115,55 104,48" fill="#4CAF50" stroke="#2D3436" strokeWidth="2" />
                            </g>
                        );
                    case 2: 
                        return (
                            <g fill="none" stroke="#2D3436" strokeWidth="2" opacity="0.4">
                                <path d="M100,35 L100,182" />
                                <path d="M100,70 L135,95 M100,100 L142,125 M100,130 L135,155" />
                                <path d="M100,70 L65,95 M100,100 L58,125 M100,130 L65,155" />
                            </g>
                        );
                    case 3: 
                        return (
                            <g fill="none" stroke="#2D3436" strokeWidth="2">
                                <path d="M152,58 L160,50" stroke="#795548" strokeWidth="6" strokeLinecap="round" />
                                <path d="M45,162 L40,165" stroke="#5D4037" strokeWidth="6" strokeLinecap="round" />
                                <path d="M152,58 Q105,80 50,162" stroke="#2D3436" strokeWidth="1.5" strokeLinecap="round" opacity="0.25" />
                            </g>
                        );
                    case 4: 
                        return (
                            <g fill="none" stroke="#2D3436" strokeWidth="2">
                                <circle cx="100" cy="55" r="2" fill="#2D3436" />
                                <path d="M100,55 Q115,35 130,45 Q115,50 100,55" fill="#4CAF50" stroke="#2D3436" strokeWidth="2" />
                                <circle cx="65" cy="100" r="1.5" fill="#2D3436" opacity="0.2" />
                                <circle cx="75" cy="140" r="1.5" fill="#2D3436" opacity="0.2" />
                                <circle cx="135" cy="110" r="1.5" fill="#2D3436" opacity="0.2" />
                                <circle cx="125" cy="150" r="1.5" fill="#2D3436" opacity="0.2" />
                            </g>
                        );
                    case 5: 
                        return (
                            <g fill="none" stroke="#2D3436" strokeWidth="2">
                                <path d="M100,75 C100,60 110,45 115,45" stroke="#795548" strokeWidth="3" strokeLinecap="round" />
                                <path d="M100,65 Q90,60 90,50 T100,45" stroke="#4CAF50" strokeWidth="1.5" strokeLinecap="round" />
                                <path d="M73,85 A5,5 0 0 1 78,80" stroke="#FFF" strokeWidth="2.5" strokeLinecap="round" opacity="0.8" />
                                <path d="M93,85 A5,5 0 0 1 98,80" stroke="#FFF" strokeWidth="2.5" strokeLinecap="round" opacity="0.8" />
                                <path d="M113,85 A5,5 0 0 1 118,80" stroke="#FFF" strokeWidth="2.5" strokeLinecap="round" opacity="0.8" />
                                <path d="M83,110 A5,5 0 0 1 88,105" stroke="#FFF" strokeWidth="2.5" strokeLinecap="round" opacity="0.8" />
                                <path d="M103,110 A5,5 0 0 1 108,105" stroke="#FFF" strokeWidth="2.5" strokeLinecap="round" opacity="0.8" />
                                <path d="M93,135 A5,5 0 0 1 98,130" stroke="#FFF" strokeWidth="2.5" strokeLinecap="round" opacity="0.8" />
                            </g>
                        );
                    default:
                        return null;
                }
            };

            const getPos = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: (clientX - rect.left) * (200 / rect.width),
                    y: (clientY - rect.top) * (200 / rect.height)
                };
            };

            const drawSegment = (x1, y1, x2, y2) => {
                const ctx = ctxRef.current;
                ctx.save();
                ctx.beginPath();
                ctx.clip(new Path2D(currentColorLevel.path)); 
                ctx.globalAlpha = 0.85; 
                ctx.lineWidth = 26; 
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = selectedColor.code;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
                ctx.restore();
            };

            const handleStart = (e) => {
                if (isCompleted) return;
                if (!selectedColor) {
                    speakBilingual("請先選一個彩筆喔！", "Please choose a color first!");
                    return;
                }
                if (!currentColorLevel.targetColors.includes(selectedColor.code)) {
                    speakBilingual(
                        `不對喔，${currentColorLevel.objectName.zh}不是${selectedColor.zh}的喔！`, 
                        `No, ${currentColorLevel.objectName.en} is not ${selectedColor.en}!`
                    );
                    return;
                }
                setIsDrawing(true);
                const pos = getPos(e);
                lastPos.current = pos;
                drawSegment(pos.x, pos.y, pos.x, pos.y);
            };

            const handleMove = (e) => {
                if (!isDrawing) return;
                const pos = getPos(e);
                drawSegment(lastPos.current.x, lastPos.current.y, pos.x, pos.y);
                lastPos.current = pos;
            };

            const handleEnd = () => {
                if (!isDrawing) return;
                setIsDrawing(false);
                
                const drawData = ctxRef.current.getImageData(0,0,200,200).data;
                const maskData = maskCanvasRef.current.getContext('2d').getImageData(0,0,200,200).data;
                let totalPixels = 0, coloredPixels = 0;
                
                for (let i = 0; i < maskData.length; i += 4) {
                    if (maskData[i+3] > 0) { 
                        totalPixels++;
                        if (drawData[i+3] > 50) { 
                            coloredPixels++;
                        }
                    }
                }
                
                const percent = totalPixels > 0 ? (coloredPixels / totalPixels) * 100 : 0;
                setCoverage(percent);
                
                if (percent >= 75 && !isCompleted) {
                    setIsCompleted(true);
                    const finalZh = `哇！太棒了！你完成了${selectedColor.zh}的${currentColorLevel.objectName.zh}！`;
                    const finalEn = `Wonderful! You finished the ${selectedColor.en} ${currentColorLevel.objectName.en}!`;
                    speakBilingual(finalZh, finalEn);
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center p-6 font-sans select-none max-w-xl mx-auto relative">
                    
                    {/* 頂部導覽列 */}
                    <header className="w-full flex items-center justify-center bg-orange-400 text-white py-3 px-6 rounded-3xl shadow-md mb-6">
                        <h1 className="font-bold text-2xl tracking-wider">
                            {gameStage === 'color' ? '🎨 繪本第一章：認識特徵' : '🧺 繪本第二章：快樂採收'}
                        </h1>
                    </header>

                    {/* 大問句字幕區 */}
                    <div className="w-full bg-white px-6 py-5 rounded-[32px] shadow-sm mb-6 border-2 border-orange-100 text-center relative flex flex-col justify-center items-center">
                        <h2 className="text-3xl font-black text-gray-800 tracking-wider">
                            {gameStage === 'color' ? `${currentColorLevel.objectName.zh}是什麼顏色的呢？` : currentCountLevel.questionZh}
                        </h2>
                        <p className="font-en-storybook text-lg font-medium text-gray-400 italic mt-1.5">
                            {gameStage === 'color' ? `What color is the ${currentColorLevel.objectName.en}?` : currentCountLevel.questionEn}
                        </p>
                        <button 
                            onClick={speakQuestion} 
                            className="absolute right-4 top-1/2 -translate-y-1/2 text-2xl bg-orange-50 hover:bg-orange-100 p-2.5 rounded-full transition-colors"
                        >
                            🔊
                        </button>
                    </div>

                    {/* 繪本核心互動區 */}
                    <div className="relative w-full aspect-square bg-white rounded-[45px] shadow-2xl border-[12px] border-white overflow-hidden mb-6 flex items-center justify-center p-0">
                        <div className="absolute inset-0 pointer-events-none opacity-[0.03]" style={{ backgroundImage: 'linear-gradient(#000 1.5px, transparent 1.5px), linear-gradient(90deg, #000 1.5px, transparent 1.5px)', backgroundSize: '25px 25px', zIndex: 1 }} />
                        
                        {/* 著色關卡舞台 */}
                        {gameStage === 'color' && (
                            /* 核心修正：加上 key={levelIdx}，當關卡改變時，強制 React 刷新重建組件，絕不留存上一關的畫布 */
                            <div key={`color-stage-${levelIdx}`} className="relative w-[200px] h-[200px] flex items-center justify-center touch-none animate-fade-in">
                                <svg viewBox="0 0 200 200" className="absolute inset-0 w-full h-full pointer-events-none z-10">
                                    <path d={currentColorLevel.path} fill="#FAFAFA" stroke="#EAEAEA" strokeWidth="1" />
                                </svg>

                                <div 
                                    className="absolute inset-0 w-full h-full"
                                    style={{ 
                                        clipPath: `path('${currentColorLevel.path}')`,
                                        WebkitClipPath: `path('${currentColorLevel.path}')`,
                                        zIndex: 20
                                    }}
                                >
                                    <canvas 
                                        ref={canvasRef} 
                                        width="200" 
                                        height="200" 
                                        onMouseDown={handleStart} 
                                        onMouseMove={handleMove} 
                                        onMouseUp={handleEnd} 
                                        onMouseLeave={handleEnd}
                                        onTouchStart={handleStart} 
                                        onTouchMove={handleMove} 
                                        onTouchEnd={handleEnd}
                                        className="absolute inset-0 w-full h-full cursor-crosshair"
                                    />
                                </div>

                                <svg viewBox="0 0 200 200" className="absolute inset-0 w-full h-full pointer-events-none" style={{ zIndex: 30 }}>
                                    <path d={currentColorLevel.path} fill="none" stroke="#2D3436" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                                    {renderLevelDetails(currentColorLevel.id)}
                                </svg>
                            </div>
                        )}

                        {/* 數數採摘關卡舞台 */}
                        {gameStage === 'count' && (
                            <div key={`count-stage-${levelIdx}`} className="relative w-full h-full p-4 flex flex-col justify-between items-center animate-fade-in touch-none">
                                <div className="relative w-full h-[65%] flex items-center justify-center">
                                    <svg viewBox="0 0 200 130" className="absolute inset-0 w-full h-full pointer-events-none">
                                        <path d="M 90,90 L 110,90 L 115,130 L 85,130 Z" fill="#9c6644" />
                                        <circle cx="65" cy="55" r="40" fill="#2d6a4f" />
                                        <circle cx="135" cy="55" r="40" fill="#2d6a4f" />
                                        <circle cx="100" cy="45" r="45" fill="#40916c" />
                                        <circle cx="70" cy="70" r="35" fill="#40916c" />
                                        <circle cx="130" cy="70" r="35" fill="#40916c" />
                                    </svg>
                                    
                                    {currentCountLevel.positions.map((pos, idx) => {
                                        const isPicked = droppedFruits.includes(idx);
                                        return (
                                            <button
                                                key={idx}
                                                onClick={() => handleFruitClick(idx)}
                                                className={`absolute text-4xl p-1.5 transition-all duration-300 active:scale-125 ${isPicked ? 'fruit-falling pointer-events-none' : 'hover:scale-110 cursor-pointer animate-pulse'}`}
                                                style={{ 
                                                    left: `${pos.x}%`, 
                                                    top: `${pos.y}%`,
                                                    animationDuration: `${2 + (idx % 3)}s`
                                                }}
                                            >
                                                {currentCountLevel.emoji}
                                            </button>
                                        );
                                    })}
                                </div>

                                <div className="relative w-[75%] h-[28%] bg-amber-100 border-4 border-amber-600 rounded-b-3xl rounded-t-lg flex flex-col items-center justify-center shadow-md">
                                    <div className="absolute -top-6 w-20 h-10 border-4 border-amber-600 rounded-t-full pointer-events-none" />
                                    <div className="absolute inset-0 opacity-10 pointer-events-none" style={{ backgroundImage: 'repeating-linear-gradient(45deg, #000 0, #000 2px, transparent 0, transparent 8px)' }} />
                                    <span className="text-3xl font-black text-amber-950 z-10">
                                        🧺 {basketCount} / {currentCountLevel.targetCount}
                                    </span>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* 水果圖卡提示名牌 */}
                    <div className="w-full bg-orange-100/70 border-2 border-dashed border-orange-300 rounded-3xl p-4 text-center mb-6 shadow-inner">
                        <div className="text-3xl font-black text-orange-900 flex items-center justify-center gap-2">
                            <span>{gameStage === 'color' ? currentColorLevel.emoji : currentCountLevel.emoji}</span>
                            {gameStage === 'color' ? currentColorLevel.objectName.zh : currentCountLevel.objectName.zh}
                        </div>
                        <div className="font-en-storybook text-lg font-semibold text-orange-600 tracking-wide uppercase mt-1">
                            {gameStage === 'color' ? currentColorLevel.objectName.en : currentCountLevel.objectName.en}
                        </div>
                    </div>

                    {/* 底部互動控制區 */}
                    {gameStage === 'color' ? (
                        <div className="w-full bg-white/95 backdrop-blur-md p-5 rounded-[36px] shadow-xl border border-white">
                            <div className="grid grid-cols-4 gap-4 mb-3 justify-items-center">
                                {COLORS.map(c => (
                                    <button 
                                        key={c.code} 
                                        onClick={() => { 
                                            setSelectedColor(c); 
                                            speakBilingual(c.zh, currentColorLevel.targetColors.includes(c.code) ? c.en : ""); 
                                        }}
                                        className={`flex flex-col items-center transition-all duration-300 w-16 ${selectedColor?.code === c.code ? 'scale-110 -translate-y-2' : 'opacity-70 hover:opacity-100'}`}
                                    >
                                        <div className={`w-12 h-16 rounded-t-xl rounded-b-2xl border-4 ${selectedColor?.code === c.code ? 'border-orange-400 shadow-lg' : 'border-white shadow-md'}`} style={{backgroundColor: c.code}}>
                                            <div className="w-full h-6 bg-black/5 mt-4" />
                                        </div>
                                        <span className="text-base font-black mt-2 text-gray-600 tracking-wider">{c.zh}</span>
                                    </button>
                                ))}
                                
                                <div className="col-span-4 w-full flex items-center justify-between gap-4 mt-2 bg-gray-50 p-3 rounded-2xl border border-gray-200">
                                    <div className="flex items-center gap-2 flex-1">
                                        <span className="text-sm font-black text-gray-500">進度</span>
                                        <div className="flex-1 h-4 bg-gray-200 rounded-full overflow-hidden border border-gray-300">
                                            <div className="h-full bg-green-400 transition-all duration-300" style={{width: `${Math.min(100, (coverage/75)*100)}%`}}></div>
                                        </div>
                                        <span className="text-xs font-bold text-gray-600">{Math.round(Math.min(100, (coverage/75)*100))}%</span>
                                    </div>
                                    <button 
                                        onClick={() => { 
                                            initCanvas();
                                            setCoverage(0);
                                            setIsCompleted(false);
                                            speakBilingual('重來一次', 'Try again');
                                        }}
                                        className="flex items-center gap-1 bg-red-100 text-red-600 px-4 py-2 rounded-xl font-black text-sm shadow-sm hover:bg-red-200 active:scale-95 transition-all"
                                    >
                                        🔄 重來
                                    </button>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="w-full bg-white/95 backdrop-blur-md p-4 rounded-[28px] shadow-xl border border-white text-center">
                            <button 
                                onClick={() => {
                                    setBasketCount(0);
                                    setDroppedFruits([]);
                                    setIsCompleted(false);
                                    speakBilingual('重新數數', 'Reset counting');
                                }}
                                className="inline-flex items-center justify-center gap-2 bg-amber-500 text-white font-black text-lg py-3 px-8 rounded-2xl shadow-md hover:bg-amber-600 active:scale-95 transition-all w-full"
                            >
                                <RotateCcwIcon /> 重新把水果掛回樹上
                            </button>
                        </div>
                    )}

                    {/* 繪本翻頁過關彈窗 (最高級 Z-Index 固定圖層) */}
                    {isCompleted && (
                        <div className="fixed inset-0 z-50 bg-white/85 backdrop-blur-sm flex items-center justify-center animate-fade-in text-center p-4">
                            <div className="animate-pop-in bg-white p-6 rounded-[35px] shadow-2xl border-4 border-green-400 max-w-[300px] w-full">
                                <div className="text-3xl mb-2 flex justify-center gap-1.5">
                                    ⭐️ ⭐ ⭐️
                                </div>
                                <p className="text-3xl font-black text-green-600 mb-2">太厲害了！</p>
                                
                                {gameStage === 'color' ? (
                                    <div>
                                        <p className="text-2xl text-gray-800 font-black">這是{selectedColor?.zh}的{currentColorLevel.objectName.zh}</p>
                                        <p className="font-en-storybook text-lg text-gray-400 italic mb-5 mt-1">This is a {selectedColor?.en} {currentColorLevel.objectName.en}</p>
                                    </div>
                                ) : (
                                    <div>
                                        <p className="text-2xl text-gray-800 font-black">你採收了 {currentCountLevel.targetCount} 顆{currentCountLevel.objectName.zh}</p>
                                        <p className="font-en-storybook text-lg text-gray-400 italic mb-5 mt-1">You harvested {currentCountLevel.targetCount} {currentCountLevel.objectName.en}</p>
                                    </div>
                                )}
                                
                                <button 
                                    onClick={handleNextLevel} 
                                    className="bg-green-500 text-white px-8 py-3 rounded-2xl font-bold text-xl shadow-lg hover:bg-green-600 active:scale-95 transition-all flex items-center justify-center gap-2 mx-auto w-full cursor-pointer"
                                >
                                    {gameStage === 'color' && levelIdx + 1 === COLOR_LEVELS.length ? '翻開下一章 ➔' : '下一關 ➔'}
                                </button>
                            </div>
                            <Confetti />
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
